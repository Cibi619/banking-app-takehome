<app-navbar></app-navbar>
<div class="accounts-container">
  <div class="accounts-header">
    <h2>My Accounts</h2>
    <div class="header-actions">
      <button mat-raised-button color="primary" routerLink="/accounts/create">
        <mat-icon>add</mat-icon>
        Create Account
      </button>
      <button mat-raised-button routerLink="/history">
        <mat-icon>history</mat-icon>
        History
      </button>
    </div>
  </div>

  @if (loadingService.isLoading()) {
  <div class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
  }
  @else if (accounts.length > 0) {
  <div class="accounts-list">
    @for (account of accounts; track account.id) {
    <mat-card class="account-row">
      <mat-card-content>
        <div class="account-info">
          <div class="account-details">
            <span class="account-type">{{ account.type | titlecase }}</span>
            <span class="account-name">{{ account.name }}</span>
          </div>
          <span class="account-balance">${{ account.balance | number:'1.2-2' }}</span>
          <button mat-raised-button color="accent" [routerLink]="['/transfer']"
            [queryParams]="{ accountId: account.id }">
            Transfer
          </button>
        </div>
      </mat-card-content>
    </mat-card>
    }
  </div>
  }
 @else {
  <div class="empty-state">
    <mat-icon>account_balance_wallet</mat-icon>
    <p>No accounts found</p>
    <button mat-raised-button color="primary" routerLink="/accounts/create">
      <mat-icon>add</mat-icon>
      Create Account
    </button>
  </div>
  }
</div>
